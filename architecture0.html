<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Risk Box 技術架構</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
:root{
--accent:#00ff66;
--bg:#0b0f14;
--card:#11161c;
--text:#e6edf3;
--dim:#8b949e;
--border:#222;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Inter,system-ui,sans-serif;
line-height:1.7;
}

/* 頂部 */
header{
position:sticky;
top:0;
background:rgba(11,15,20,.9);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
padding:14px 18px;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:var(--accent);
font-weight:700;
letter-spacing:1px;
font-size:14px;
text-decoration:none;
}

.back{
color:var(--dim);
font-size:12px;
text-decoration:none;
}

/* 進度條 */
.progress{
position:fixed;
top:0;
left:0;
height:3px;
background:var(--accent);
width:0%;
z-index:1000;
}

/* 快速導航 */
.quick-nav{
position:sticky;
top:52px;
background:#0d131a;
padding:10px;
overflow-x:auto;
white-space:nowrap;
border-bottom:1px solid var(--border);
}

.quick-nav a{
display:inline-block;
color:var(--dim);
text-decoration:none;
font-size:12px;
margin-right:14px;
}

.quick-nav a:hover{
color:var(--accent);
}

/* 內容 */
.container{
max-width:720px;
margin:auto;
padding:25px 18px 60px;
}

.section-card{
background:var(--card);
border:1px solid var(--border);
padding:18px;
border-radius:10px;
margin-bottom:18px;
}

.section-card h2{
margin-top:0;
scroll-margin-top:90px;
}

/* mermaid */
.mermaid{
background:white!important;
padding:12px;
border-radius:6px;
margin:18px 0;
}

/* 回到頂部 */
.top-btn{
position:fixed;
right:18px;
bottom:18px;
background:var(--accent);
color:#000;
border:none;
border-radius:50%;
width:42px;
height:42px;
font-size:18px;
cursor:pointer;
display:none;
}

/* 表格 */
table{
width:100%;
border-collapse:collapse;
margin:20px 0;
}

th,td{
border:1px solid var(--border);
padding:8px;
text-align:left;
}

</style>
</head>

<body>

<div class="progress" id="progress"></div>

<header>
<a class="logo">RISK BOX 架構</a>
<a class="back" href="index.html">返回</a>
</header>

<div class="quick-nav" id="toc"></div>

<div class="container">
<div id="render-content">正在載入架構文件…</div>
</div>

<button class="top-btn" onclick="scrollToTop()">↑</button>

<script>
mermaid.initialize({startOnLoad:false});

/* 載入 Markdown */
fetch('docs/Architecture.md')
.then(r=>r.text())
.then(md=>{

const html = marked.parse(md);
document.getElementById('render-content').innerHTML = html;

/* 自動生成錨點 & 導覽 */
const headings = document.querySelectorAll('#render-content h2');
const toc = document.getElementById('toc');

headings.forEach((h,i)=>{
const id="sec"+i;
h.id=id;

const a=document.createElement('a');
a.href="#"+id;
a.innerText=h.innerText;
toc.appendChild(a);
});

/* Mermaid */
document.querySelectorAll('pre code.language-mermaid')
.forEach(block=>{
const div=document.createElement('div');
div.className='mermaid';
div.innerHTML=block.textContent;
block.parentElement.replaceWith(div);
});
mermaid.run();

/* MathJax */
if(window.MathJax) MathJax.typesetPromise();
});

/* 閱讀進度條 */
window.onscroll=()=>{
const winScroll=document.body.scrollTop||document.documentElement.scrollTop;
const height=document.documentElement.scrollHeight-document.documentElement.clientHeight;
document.getElementById("progress").style.width=(winScroll/height)*100+"%";

document.querySelector('.top-btn').style.display =
winScroll>300?'block':'none';
};

function scrollToTop(){
window.scrollTo({top:0,behavior:'smooth'});
}
</script>

</body>
</html>
