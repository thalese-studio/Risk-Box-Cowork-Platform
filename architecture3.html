<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技術規格 | RISK BOX</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #00ff66; --bg: #0d1117; --sidebar: #161b22; --text: #c9d1d9; --dim: #8b949e; --border: #30363d; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; font-size: 14px; line-height: 1.6; }
        
        header { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(13,17,23,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 1001; }
        header a { color: var(--dim); text-decoration: none; font-size: 12px; letter-spacing: 1px; }

        /* 側邊導航修正 */
        aside { width: 240px; height: 100vh; background: var(--sidebar); border-right: 1px solid var(--border); position: fixed; top: 50px; padding: 20px; overflow-y: auto; z-index: 1000; }
        aside h4 { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }
        aside ul { list-style: none; padding: 0; margin: 0; }
        aside li { margin-bottom: 12px; cursor: pointer; }
        aside a { color: var(--text); text-decoration: none; font-size: 13px; display: block; width: 100%; }
        aside a:hover { color: var(--primary); }

        /* 手機端適配：將選單改為頂部堆疊且不遮擋內容 */
        @media (max-width: 768px) {
            aside { 
                width: 100%; 
                height: auto; 
                position: relative; 
                top: 50px; 
                border-right: none; 
                border-bottom: 1px solid var(--border);
                padding: 15px 20px;
            }
            main { margin-left: 0 !important; padding: 30px 20px !important; }
        }

        main { margin-left: 240px; margin-top: 50px; padding: 60px 80px; width: 100%; max-width: 1100px; }
        #render-content h1 { font-size: 1.8rem; color: #fff; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        #render-content h2 { font-size: 1.4rem; color: #58a6ff; margin-top: 40px; scroll-margin-top: 70px; } /* 使用原生捲動偏移 */
        #render-content h3 { font-size: 1.1rem; color: var(--primary); margin-top: 25px; scroll-margin-top: 70px; }
        
        .mermaid { background: white !important; border-radius: 4px; padding: 15px; margin: 20px 0; max-width: 100%; overflow-x: auto; }
        table { display: block; overflow-x: auto; width: 100%; border-collapse: collapse; margin: 20px 0; }
        table th, table td { border: 1px solid var(--border); padding: 10px; text-align: left; }
    </style>
</head>
<body>

<header><a href="index.html">← 返回首頁</a></header>

<aside id="toc-sidebar">
    <h4>核心技術</h4>
    <ul>
        <li><a href="#定位">1. 系統定位</a></li>
        <li><a href="#AI辨識">2. 行為 DNA 辨識</a></li>
        <li><a href="#演算模型">3. R-score 演算</a></li>
    </ul>
    <h4>實戰防禦劇本</h4>
    <ul>
        <li><a href="#高齡防禦">● 高齡資產保護</a></li>
        <li><a href="#水房獵殺">● 水房集群偵測</a></li>
        <li><a href="#跨境防禦">● 地下匯兌與虛擬幣</a></li>
        <li><a href="#資產追蹤">● 全網追蹤與攔截</a></li>
    </ul>
</aside>

<main>
    <div id="render-content">正在同步聯防協議文件...</div>
</main>

<script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    // 強化的 ID 映射邏輯
    function mapHeadingIds() {
        document.querySelectorAll('#render-content h2, #render-content h3').forEach(el => {
            const text = el.innerText;
            if(text.includes("定位")) el.id = "定位";
            else if(text.includes("DNA") || text.includes("辨識")) el.id = "AI辨識";
            else if(text.includes("演算") || text.includes("R-score")) el.id = "演算模型";
            else if(text.includes("高齡")) el.id = "高齡防禦";
            else if(text.includes("水房")) el.id = "水房獵殺";
            else if(text.includes("地下匯兌") || text.includes("虛擬")) el.id = "跨境防禦";
            else if(text.includes("追蹤") || text.includes("攔截")) el.id = "資產追蹤";
        });
    }

    fetch('docs/Architecture.md')
    .then(r => r.text())
    .then(text => {
        document.getElementById('render-content').innerHTML = marked.parse(text);
        
        // 1. 映射 ID
        mapHeadingIds();

        // 2. 渲染公式
        if (window.MathJax) MathJax.typesetPromise();

        // 3. 渲染圖表
        const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
        mermaidBlocks.forEach((block) => {
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.innerHTML = block.textContent;
            block.parentElement.replaceChild(div, block.parentElement);
        });
        mermaid.run();

        // 4. 處理錨點跳轉 (修正手機版位移)
        document.querySelectorAll('aside a').forEach(link => {
            link.onclick = function(e) {
                const id = this.getAttribute('href').substring(1);
                const target = document.getElementById(id);
                if (target) {
                    e.preventDefault();
                    const headerOffset = 70;
                    const elementPosition = target.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: "smooth"
                    });
                }
            };
        });
    });
</script>

</body>
</html>
