<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技術規格 | RISK BOX</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #00ff66; --bg: #0d1117; --sidebar: #161b22; --text: #c9d1d9; --dim: #8b949e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; font-size: 14px; }
        
        header { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(13,17,23,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 20px; z-index: 1000; box-sizing: border-box; }
        header a { color: var(--dim); text-decoration: none; font-size: 12px; letter-spacing: 1px; }

        aside { width: 240px; height: 100vh; background: var(--sidebar); border-right: 1px solid #30363d; position: fixed; top: 50px; padding: 30px 20px; box-sizing: border-box; overflow-y: auto; }
        aside h4 { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 15px; }
        aside ul { list-style: none; padding: 0; }
        aside li { margin-bottom: 10px; }
        aside a { color: var(--text); text-decoration: none; font-size: 13px; transition: 0.2s; }
        aside a:hover { color: var(--primary); padding-left: 5px; }

        main { margin-left: 240px; margin-top: 50px; padding: 60px 80px; width: 100%; max-width: 850px; box-sizing: border-box; }
        #render-content h1 { font-size: 1.8rem; color: #fff; margin-bottom: 40px; border-bottom: 1px solid #30363d; padding-bottom: 20px; }
        #render-content h2 { font-size: 1.3rem; color: #58a6ff; margin-top: 50px; }
        #render-content h3 { font-size: 1.1rem; color: var(--primary); margin-top: 30px; }
        #render-content p, #render-content li { line-height: 1.7; color: #acbac7; }
        
        .formula-box { background: #010409; border: 1px solid #30363d; padding: 20px; border-radius: 6px; margin: 20px 0; text-align: center; }
        .mermaid { background: #fff !important; border-radius: 4px; padding: 20px; margin: 30px 0; }
    </style>
</head>
<body>

<header><a href="index.html">← RISK BOX 平台首頁</a></header>

<aside id="toc-sidebar">
    <h4>核心技術</h4>
    <ul>
        <li><a href="#定位">1. 系統定位</a></li>
        <li><a href="#AI辨識">2. 行為 DNA 辨識</a></li>
        <li><a href="#演算模型">3. R-score 演算</a></li>
    </ul>
    <h4>實戰防禦劇本</h4>
    <ul>
        <li><a href="#高齡防禦">● 高齡資產保護</a></li>
        <li><a href="#水房獵殺">● 水房集群偵測</a></li>
        <li><a href="#跨境防禦">● 地下匯兌與虛擬幣</a></li>
        <li><a href="#資產追蹤">● 全網追蹤與攔截</a></li>
    </ul>
</aside>

<main><div id="render-content">載入中技術白皮書...</div></main>

<script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
    fetch('docs/Architecture.md').then(r => r.text()).then(text => {
        document.getElementById('render-content').innerHTML = marked.parse(text);
        
        // 渲染公式與圖表
        if (window.MathJax) MathJax.typesetPromise();
        const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
        mermaidBlocks.forEach((block) => {
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.innerHTML = block.textContent;
            block.parentElement.parentElement.replaceChild(div, block.parentElement);
        });
        mermaid.run();

        // 自動綁定 ID 導航
        document.querySelectorAll('#render-content h2').forEach(h2 => {
            const t = h2.innerText;
            if(t.includes("定位")) h2.id = "定位";
            if(t.includes("判讀") || t.includes("DNA")) h2.id = "AI辨識";
            if(t.includes("演算")) h2.id = "演算模型";
            if(t.includes("高齡")) h2.id = "高齡防禦";
            if(t.includes("水房")) h2.id = "水房獵殺";
            if(t.includes("地下匯兌") || t.includes("虛擬")) h2.id = "跨境防禦";
            if(t.includes("追蹤") || t.includes("攔截")) h2.id = "資產追蹤";
        });
    });
</script>
</body>
</html>
