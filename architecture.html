<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技術規格 | RISK BOX</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #00ff66; --bg: #0d1117; --sidebar: #161b22; --text: #c9d1d9; --dim: #8b949e; --border: #30363d; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; font-size: 14px; line-height: 1.6; }
        
        /* 頂部導航 */
        header { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(13,17,23,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 1000; }
        header a { color: var(--dim); text-decoration: none; font-size: 12px; letter-spacing: 1px; }

        /* 側邊導航 - 電腦版固定，手機版為下拉式 */
        aside { width: 240px; height: 100vh; background: var(--sidebar); border-right: 1px solid var(--border); position: fixed; top: 50px; padding: 20px; overflow-y: auto; z-index: 900; transition: transform 0.3s ease; }
        aside h4 { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }
        aside ul { list-style: none; padding: 0; margin: 0; }
        aside li { margin-bottom: 12px; }
        aside a { color: var(--text); text-decoration: none; font-size: 13px; }
        aside a:hover { color: var(--primary); }

        /* 手機版樣式修正 */
        @media (max-width: 768px) {
            aside { 
                width: 100%; 
                height: auto; 
                max-height: 50vh; 
                position: relative; 
                top: 50px; 
                border-right: none; 
                border-bottom: 1px solid var(--border);
                transform: translateY(0);
            }
            main { margin-left: 0 !important; padding: 40px 20px !important; }
            .mermaid { overflow-x: auto; }
            table { display: block; overflow-x: auto; }
        }

        /* 內容區 */
        main { margin-left: 240px; margin-top: 50px; padding: 60px 80px; width: 100%; max-width: 1100px; }
        #render-content h1 { font-size: 1.8rem; color: #fff; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        #render-content h2 { font-size: 1.4rem; color: #58a6ff; margin-top: 40px; }
        #render-content h3 { font-size: 1.1rem; color: var(--primary); margin-top: 25px; }
        #render-content pre { background: #161b22; padding: 15px; border-radius: 6px; overflow-x: auto; border: 1px solid var(--border); }
        #render-content blockquote { border-left: 4px solid var(--primary); padding-left: 20px; color: var(--dim); margin-left: 0; }

        .formula-box { background: #010409; border: 1px solid var(--border); padding: 20px; border-radius: 6px; margin: 20px 0; text-align: center; overflow-x: auto; }
        .mermaid { background: white !important; border-radius: 4px; padding: 15px; margin: 20px 0; }
    </style>
</head>
<body>

<header><a href="index.html">← 返回首頁</a></header>

<aside id="toc-sidebar">
    <h4>核心技術</h4>
    <ul>
        <li><a href="#定位">1. 系統定位</a></li>
        <li><a href="#AI辨識">2. 行為 DNA 辨識</a></li>
        <li><a href="#演算模型">3. R-score 演算</a></li>
    </ul>
    <h4>實戰防禦劇本</h4>
    <ul>
        <li><a href="#高齡防禦">● 高齡資產保護</a></li>
        <li><a href="#水房獵殺">● 水房集群偵測</a></li>
        <li><a href="#跨境防禦">● 地下匯兌與虛擬幣</a></li>
        <li><a href="#資產追蹤">● 全網追蹤與攔截</a></li>
    </ul>
</aside>

<main>
    <div id="render-content">正在解密技術文件...</div>
</main>

<script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });

    fetch('docs/Architecture.md')
    .then(r => r.text())
    .then(text => {
        document.getElementById('render-content').innerHTML = marked.parse(text);
        
        // 渲染公式
        if (window.MathJax) {
            MathJax.typesetPromise();
        }

        // 渲染 Mermaid 圖表
        const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
        mermaidBlocks.forEach((block, i) => {
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.innerHTML = block.textContent;
            const pre = block.parentElement;
            pre.parentElement.replaceChild(div, pre);
        });
        mermaid.run();

        // 建立錨點 ID 連結 (與手機版導航匹配)
        document.querySelectorAll('#render-content h2').forEach(h2 => {
            const t = h2.innerText;
            if(t.includes("定位")) h2.id = "定位";
            if(t.includes("判讀") || t.includes("DNA")) h2.id = "AI辨識";
            if(t.includes("演算")) h2.id = "演算模型";
            if(t.includes("高齡")) h2.id = "高齡防禦";
            if(t.includes("水房")) h2.id = "水房獵殺";
            if(t.includes("地下匯兌") || t.includes("虛擬")) h2.id = "跨境防禦";
            if(t.includes("追蹤") || t.includes("攔截")) h2.id = "資產追蹤";
        });

        // 點擊選單後自動捲動並修正偏移 (防止標題被 Header 遮住)
        document.querySelectorAll('aside a').forEach(link => {
            link.addEventListener('click', (e) => {
                const targetId = link.getAttribute('href').substring(1);
                const targetEl = document.getElementById(targetId);
                if (targetEl) {
                    e.preventDefault();
                    const offset = 70; // Header 的高度加上間距
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = targetEl.getBoundingClientRect().top;
                    const elementPosition = elementRect - bodyRect;
                    const offsetPosition = elementPosition - offset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: 'smooth'
                    });
                }
            });
        });
    });
</script>

</body>
</html>
